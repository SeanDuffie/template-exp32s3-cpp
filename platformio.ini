; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env]
platform = espressif32
framework = arduino
build_type = debug ; Force the compiler to include debug symbols
monitor_filters = esp32_exception_decoder ; Enable the decoder filter on the serial monitor
monitor_speed = 115200

build_flags = 
	-DBOARD_HAS_PSRAM
	; -mfix-esp32-psram-cache-issue  ; (optional, for specific cache issues)
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1
	-I include/core
	-I include/network
	-I include/sensors

lib_deps = 
	mathieucarbou/AsyncTCP @ ^3.2.4
	mathieucarbou/ESPAsyncWebServer @ ^3.1.5
	alanswx/ESPAsyncWiFiManager@^0.31
	adafruit/Adafruit BME280 Library @ ^2.2.4
	paulstoffregen/OneWire @ ^2.3.8
	milesburton/DallasTemperature @ ^3.11.0
	adafruit/Adafruit MPU6050 @ ^2.2.6
	claws/BH1750 @ ^1.3.0
	mikalhart/TinyGPSPlus @ ^1.0.3
	adafruit/RTClib @ ^2.1.3
	bblanchon/ArduinoJson @ ^7.0.0

[env:esp32s3_32mb_8mb]
board = esp32-s3-devkitc-1
board_build.partitions = partitions.csv
board_upload.flash_size = 32MB ; 32MB Flash Configuration
board_build.arduino.memory_type = opi_opi ; 8MB PSRAM Configuration (Requires OPI)
board_build.flash_mode = opi
board_build.filesystem = littlefs ; Filesystem for webserver files

[env:local_usb]
extends = env:esp32s3_32mb_8mb
upload_protocol = esptool

[env:sensor_node_1]
extends = env:esp32s3_32mb_8mb
upload_protocol = espota
upload_port = 192.168.0.181

[env:sensor_node_2]
extends = env:esp32s3_32mb_8mb
upload_protocol = espota
upload_port = 192.168.0.173
